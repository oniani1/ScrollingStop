<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScrollStop Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4d8bff",
                        "background-light": "#f5f6f8",
                        "background-dark": "#0f1623",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen pb-24">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 px-4 h-16 flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Settings</h1>
</header>
<main class="max-w-md mx-auto p-4 space-y-6">
<!-- Blocked Apps Section -->
<section class="space-y-3">
<h2 class="px-1 text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Blocked Apps</h2>
<div class="bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden backdrop-blur-md">
<div class="divide-y divide-slate-200 dark:divide-slate-800">
<!-- App Item -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-gradient-to-tr from-purple-500 to-pink-500 flex items-center justify-center shadow-lg" data-alt="Instagram app icon purple pink gradient">
<span class="text-white font-bold text-xs">IG</span>
</div>
<span class="font-medium">Instagram</span>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined">remove_circle_outline</span>
</button>
</div>
<!-- App Item -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-black flex items-center justify-center border border-slate-700 shadow-lg" data-alt="TikTok app icon minimalist black">
<span class="text-white font-bold text-xs">TT</span>
</div>
<span class="font-medium">TikTok</span>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined">remove_circle_outline</span>
</button>
</div>
<!-- App Item -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-slate-900 flex items-center justify-center shadow-lg" data-alt="Twitter X app icon dark slate">
<span class="text-white font-bold text-xs">X</span>
</div>
<span class="font-medium">Twitter / X</span>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined">remove_circle_outline</span>
</button>
</div>
</div>
<button class="w-full p-4 text-primary font-semibold flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors border-t border-slate-200 dark:border-slate-800">
<span class="material-symbols-outlined text-sm">add</span>
                    Add App
                </button>
</div>
</section>
<!-- Limits Section -->
<section class="space-y-3">
<h2 class="px-1 text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Limits</h2>
<div class="bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl p-5 space-y-6 backdrop-blur-md">
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="font-medium">Daily Limit</label>
<span class="text-primary font-bold">60 minutes</span>
</div>
<div class="relative h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full">
<div class="absolute h-full w-2/3 bg-gradient-to-r from-primary to-purple-500 rounded-full"></div>
<div class="absolute top-1/2 left-2/3 -translate-y-1/2 size-5 bg-white border-2 border-primary rounded-full shadow-lg"></div>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="font-medium">Profit Threshold</label>
<span class="text-primary font-bold">$100</span>
</div>
<div class="relative h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full">
<div class="absolute h-full w-1/2 bg-gradient-to-r from-primary to-purple-500 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-y-1/2 size-5 bg-white border-2 border-primary rounded-full shadow-lg"></div>
</div>
</div>
</div>
</section>
<!-- Trading Connections Section -->
<section class="space-y-3">
<h2 class="px-1 text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Trading Connections</h2>
<div class="bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden backdrop-blur-md">
<div class="divide-y divide-slate-200 dark:divide-slate-800">
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="size-8 rounded-full bg-yellow-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-yellow-500 text-lg">account_balance_wallet</span>
</div>
<span class="font-medium">Binance API</span>
</div>
<span class="px-3 py-1 bg-green-500/10 text-green-500 text-xs font-bold rounded-full border border-green-500/20 uppercase">Connected</span>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<div class="size-8 rounded-full bg-purple-500/20 flex items-center justify-center">
<span class="material-symbols-outlined text-purple-500 text-lg">token</span>
</div>
<span class="font-medium">Solana Wallet</span>
</div>
<button class="px-4 py-1.5 border border-primary/30 text-primary text-sm font-semibold rounded-lg hover:bg-primary hover:text-white transition-all">
                            Connect
                        </button>
</div>
</div>
</div>
</section>
<!-- Bypass Section -->
<section class="space-y-3">
<h2 class="px-1 text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Bypass</h2>
<div class="bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl p-4 backdrop-blur-md">
<label class="block text-sm font-medium mb-2 text-slate-400">Shame Phrase</label>
<div class="relative">
<input class="w-full bg-slate-200 dark:bg-slate-800 border-none rounded-lg p-3 text-sm text-slate-600 dark:text-slate-300 focus:ring-1 focus:ring-primary/50" readonly="" type="text" value="I choose scrolling over making money"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">lock</span>
</div>
<p class="mt-2 text-xs text-slate-500 italic">You must type this exact phrase to disable your blocks.</p>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-slate-100/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 py-2">
<div class="max-w-md mx-auto flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">insert_chart</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">notifications</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</a>
</div>
</nav>
</body></html>
